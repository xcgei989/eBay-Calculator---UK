<div class="currency-controls">
    <div class="exchange-rate">
        <span id="exchangeRateLabel">英镑汇率:</span>
        <input type="number" id="exchangeRate" value="9" step="0.01" min="0" readonly>
    </div>
    
    <div class="action-buttons">
        <button class="btn btn-reset" id="resetBtn">重置</button>
    </div>
</div>

<!-- 最后更新时间 -->
<div class="last-update" id="lastUpdateTime">
    <span class="last-update-icon">🕒</span>
    <span>最后更新时间: <span id="updateTimeText">2026年03月03日</span></span>
</div>
</div>

<!-- 主内容区域 -->
<div class="main-content">
<!-- 输入区域 -->
<div class="input-section">
    <!-- 输入参数标题区域 -->
    <div class="input-header">
        <div class="input-title">输入参数</div>
        
        <!-- 站点切换按钮 - 移动到输入参数右侧 -->
        <div class="site-switcher">
            <button class="site-btn uk active" id="siteUK">英国站点</button>
            <button class="site-btn de" id="siteDE">德国站点</button>
        </div>
    </div>
    
    <div class="input-group">
        <label for="purchaseCost">采购成本 (¥)</label>
        <input type="number" id="purchaseCost" placeholder="0" value="" step="0.01" min="0">
        <div class="input-hint">产品的采购成本，单位：人民币</div>
    </div>
    
    <div class="input-group">
        <label for="productWeight">产品重量 (kg)</label>
        <input type="number" id="productWeight" placeholder="0" value="" step="0.01" min="0">
        <div class="input-hint">产品的重量，单位：千克</div>
    </div>
    
    <div class="input-group">
        <label for="listingPrice" id="listingPriceLabel">刊登价格 (£)</label>
        <input type="number" id="listingPrice" placeholder="0" value="" step="0.01" min="0">
        <div class="input-hint" id="listingPriceHint">在eBay上刊登的价格，单位：英镑</div>
    </div>
    
    <div class="input-group">
        <label>产品类型</label>
        <div class="product-types">
            <div class="type-tag selected-normal" id="typeNormal">普货</div>
            <div class="type-tag" id="typeFood">食品/液体/膏体/胶囊</div>
            <div class="type-tag" id="typeBattery">含电</div>
        </div>
        <div class="input-hint">选择产品类型以应用相应的运费规则</div>
    </div>
</div>

<!-- 结果区域 -->
<div class="country-section">
    <!-- 站点卡片 -->
    <div class="country-card">
        <div class="country-header">
            <div class="country-info">
                <h3 id="resultTitle">英国站点定价计算结果</h3>
                <p id="resultSubtitle">基于当前输入参数和产品类型的计算数据</p>
            </div>
            
            <!-- 标题右侧提示信息区域 -->
            <div class="header-notices">
                <div class="product-type-notice normal" id="headerProductTypeNotice">
                    当前产品类型：普货
                </div>
                <div class="processing-notice" id="headerProcessingNotice">
                    处理时间：7个工作日
                </div>
            </div>
        </div>
        
        <div class="country-content">
            <div class="results-columns" id="resultsContainer">
                <!-- 第一列：利润、利润率、刊登价格 -->
                <div class="results-column">
                    <div class="result-card profit-card green">
                        <div class="result-label">利润</div>
                        <div class="result-value" id="profitValue">0.00</div>
                    </div>
                    <div class="result-card green">
                        <div class="result-label">利润率</div>
                        <div class="result-value profit-margin" id="profitMarginValue">0.00%</div>
                        <div class="profit-warning" id="profitWarning" style="display: none;">
                            <span class="warning-icon">⚠</span> 利润率低于30%
                        </div>
                    </div>
                    <div class="result-card listing-card">
                        <div class="result-label" id="listingPriceResultLabel">刊登价格</div>
                        <div class="result-value" id="listingPriceResult">0.00<span class="listing-price-symbol" id="listingPriceSymbol">£</span></div>
                    </div>
                </div>
                
                <!-- 第二列：成本相关 -->
                <div class="results-column">
                    <div class="result-card red">
                        <div class="result-label">采购成本</div>
                        <div class="result-value" id="purchaseCostResult">0.00</div>
                    </div>
                    <div class="result-card red">
                        <div class="result-label">国际物流成本</div>
                        <div class="result-value" id="shippingCostResult">0.00</div>
                    </div>
                    <div class="result-card red">
                        <div class="result-label">总成本</div>
                        <div class="result-value" id="totalCostResult">0.00</div>
                    </div>
                </div>
                
                <!-- 第三列：其他信息 -->
                <div class="results-column">
                    <div class="result-card cyan">
                        <div class="result-label">产品重量</div>
                        <div class="result-value" id="productWeightResult">0.00 <span style="font-size: 18px; color: #666; margin-left: 4px;">kg</span></div>
                    </div>
                    <div class="result-card red">
                        <div class="result-label">手续费</div>
                        <div class="result-value" id="ebayFeeResult">0.00</div>
                    </div>
                    <!-- 空卡片占位，确保三列高度一致 -->
                    <div class="result-card" style="visibility: hidden; border-left-color: transparent; background-color: transparent;">
                        <div class="result-label">占位</div>
                        <div class="result-value">0.00</div>
                    </div>
                </div>
            </div>
            
            <!-- 国际运费计算详情区域 - 新增 -->
            <div class="shipping-detail" id="shippingDetail">
                <div class="shipping-detail-title">国际运费计算详情</div>
                <div class="shipping-detail-content" id="shippingDetailContent">
                    <!-- 内容将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</div>

<script>
// 获取DOM元素
const purchaseCostInput = document.getElementById('purchaseCost');
const productWeightInput = document.getElementById('productWeight');
const listingPriceInput = document.getElementById('listingPrice');

const updateTimeText = document.getElementById('updateTimeText');
const siteUKBtn = document.getElementById('siteUK');
const siteDEBtn = document.getElementById('siteDE');
const pageTitle = document.getElementById('pageTitle');
const pageSubtitle = document.getElementById('pageSubtitle');

const listingPriceLabel = document.getElementById('listingPriceLabel');

const resultTitle = document.getElementById('resultTitle');
const resultSubtitle = document.getElementById('resultSubtitle');
const listingPriceResultLabel = document.getElementById('listingPriceResultLabel');
const listingPriceSymbol = document.getElementById('listingPriceSymbol');

// 结果显示元素
const profitValue = document.getElementById('profitValue');
const profitMarginValue = document.getElementById('profitMarginValue');
const profitWarning = document.getElementById('profitWarning');
const purchaseCostResult = document.getElementById('purchaseCostResult');
const shippingCostResult = document.getElementById('shippingCostResult');
const totalCostResult = document.getElementById('totalCostResult');
const productWeightResult = document.getElementById('productWeightResult');
const ebayFeeResult = document.getElementById('ebayFeeResult');
const listingPriceResult = document.getElementById('listingPriceResult');

// 标题右侧提示信息元素
const headerProductTypeNotice = document.getElementById('headerProductTypeNotice');
const headerProcessingNotice = document.getElementById('headerProcessingNotice');

// 国际运费详情元素
const shippingDetailContent = document.getElementById('shippingDetailContent');

// 当前选中的产品类型
let currentProductType = 'normal';

// 当前选中的站点
let currentSite = 'uk';

// 站点配置
const siteConfig = {
uk: {
    name: '英国',
    currencySymbol: '£',
    currencyName: '英镑',
    exchangeRate: 9,
    pageTitle: 'eBay定价计算器 - 英国站点',
    pageSubtitle: '专为eBay英国卖家设计的定价工具，支持不同产品类型的运费计算',
    resultTitle: '英国站点定价计算结果',
    resultSubtitle: '基于当前输入参数和产品类型的计算数据',
    shippingRules: {
        normal: {
            name: '普货',
            colorClass: 'normal',

                {

                },

            ]
        },

            colorClass: 'food',
            rules: [

                    description: "重量 < 0.3kg",
                    formulaText: "73 × 重量 + 16 + 11"
                },
                {

                    formula: (weight) => 74 * weight + 16 + 11,
                    description: "0.3kg ≤ 重量 ≤ 5kg",
                    formulaText: "74 × 重量 + 16 + 11"
                }
            ]
        },
        battery: {
            name: '含电',
            colorClass: 'battery',
            rules: [
                { 
                    maxWeight: 0.23, 
                    formula: (weight) => 90 * weight + 17.6,
                    description: "重量 ≤ 0.23kg",
                    formulaText: "90 × 重量 + 17.6"
                },
                { 
                    minWeight: 0.23, 
                    formula: (weight) => 55 * weight + 16 + 11,
                    description: "重量 ≥ 0.23kg",
                    formulaText: "55 × 重量 + 16 + 11"
                }
            ]
        }
    }
},
de: {
    name: '德国',
    currencySymbol: '€',
    currencyName: '欧元',
    exchangeRate: 7.8,
    pageTitle: 'eBay定价计算器 - 德国站点',
    pageSubtitle: '专为eBay德国卖家设计的定价工具，支持不同产品类型的运费计算',
    resultTitle: '德国站点定价计算结果',
    resultSubtitle: '基于当前输入参数和产品类型的计算数据',
    shippingRules: {
        normal: {
            name: '普货',
            colorClass: 'normal',
            rules: [
                { 
                    maxWeight: 0.25, 
                    formula: (weight) => 127.7 * weight + 18.1,
                    description: "重量 ≤ 0.25kg",
                    formulaText: "127.7 × 重量 + 18.1"
                },
                { 
                    minWeight: 0.25, 
                    formula: (weight) => 56 * weight + 25 + 11,
                    description: "重量 ≥ 0.25kg",
                    formulaText: "56 × 重量 + 25 + 11"
                }
            ]
        },
        food: {
            name: '食品/液体/膏体/胶囊',
            colorClass: 'food',
            rules: [
                { 
                    maxWeight: 0.3, 
                    formula: (weight) => 74 * weight + 25 + 11,
                    description: "重量 ≤ 0.3kg",
                    formulaText: "74 × 重量 + 25 + 11"
                },
                { 
                    minWeight: 0.3,
                    maxWeight: 1,
                    formula: (weight) => 76 * weight + 25 + 11,
                    description: "0.3kg < 重量 ≤ 1kg",
                    formulaText: "76 × 重量 + 25 + 11"
                },
                { 
                    minWeight: 1,
                    maxWeight: 2,
                    formula: (weight) => 78 * weight + 24 + 11,
                    description: "1kg < 重量 ≤ 2kg",
                    formulaText: "78 × 重量 + 24 + 11"
                }
            ]
        },
        battery: {
            name: '含电',
            colorClass: 'battery',
            rules: [
                { 
                    maxWeight: 0.24, 
                    formula: (weight) => 127.7 * weight + 18.1,
                    description: "重量 ≤ 0.24kg",
                    formulaText: "127.7 × 重量 + 18.1"
                },
                { 
                    minWeight: 0.24,
                    maxWeight: 0.3,
                    formula: (weight) => 64 * weight + 22 + 11,
                    description: "0.24kg < 重量 ≤ 0.3kg",
                    formulaText: "64 × 重量 + 22 + 11"
                },
                { 
                    minWeight: 0.3,
                    maxWeight: 2,
                    formula: (weight) => 70 * weight + 22 + 11,
                    description: "0.3kg < 重量 ≤ 2kg",
                    formulaText: "70 × 重量 + 22 + 11"
                }
            ]
        }
    }
}
};

// 站点切换
siteUKBtn.addEventListener('click', function() {
switchSite('uk');
});

siteDEBtn.addEventListener('click', function() {
switchSite('de');
});

// 切换站点函数
function switchSite(site) {
currentSite = site;

// 更新站点按钮状态
siteUKBtn.classList.toggle('active', site === 'uk');
siteDEBtn.classList.toggle('active', site === 'de');

// 更新页面元素
const config = siteConfig[site];
pageTitle.textContent = config.pageTitle;
pageSubtitle.textContent = config.pageSubtitle;
exchangeRateLabel.textContent = `${config.currencyName}汇率:`;
exchangeRateInput.value = config.exchangeRate;
listingPriceLabel.textContent = `刊登价格 (${config.currencySymbol})`;
listingPriceHint.textContent = `在eBay上刊登的价格，单位：${config.currencyName}`;
resultTitle.textContent = config.resultTitle;
resultSubtitle.textContent = config.resultSubtitle;
listingPriceResultLabel.textContent = '刊登价格';
listingPriceSymbol.textContent = config.currencySymbol;
listingPriceSymbol.className = site === 'uk' ? 'listing-price-symbol' : 'listing-price-euro';

// 更新文档标题
document.title = `Ebay定价计算器 - ${config.name}站点`;

// 重新计算
calculatePricing();
}

// 产品类型选择
document.querySelectorAll('.type-tag').forEach(tag => {
tag.addEventListener('click', function() {
    // 移除所有选中状态
    document.querySelectorAll('.type-tag').forEach(t => {
        t.classList.remove('selected-normal', 'selected-food', 'selected-battery');
    });
    
    // 更新当前产品类型
    if (this.id === 'typeNormal') {
        currentProductType = 'normal';
        this.classList.add('selected-normal');
    } else if (this.id === 'typeFood') {
        currentProductType = 'food';
        this.classList.add('selected-food');
    } else if (this.id === 'typeBattery') {
        currentProductType = 'battery';
        this.classList.add('selected-battery');
    }
    
    // 更新产品类型提醒
    updateProductTypeReminder();
    
    // 重新计算
    calculatePricing();
});
});

// 更新产品类型提醒
function updateProductTypeReminder() {
const productType = siteConfig[currentSite].shippingRules[currentProductType];
headerProductTypeNotice.textContent = `当前产品类型：${productType.name}`;
headerProductTypeNotice.className = `product-type-notice ${productType.colorClass}`;

// 显示或隐藏处理时间提醒
if (currentProductType === 'food' || currentProductType === 'battery') {
    headerProcessingNotice.style.display = 'block';
} else {
    headerProcessingNotice.style.display = 'none';
}
}

// 重置按钮事件
resetBtn.addEventListener('click', function() {
// 清空输入框，只显示placeholder
purchaseCostInput.value = '';
productWeightInput.value = '';
listingPriceInput.value = '';
calculatePricing();
});

// 为输入框添加自动选中文本功能
[purchaseCostInput, productWeightInput, listingPriceInput].forEach(input => {
// 焦点事件：选中所有文本
input.addEventListener('focus', function() {
    this.select();
});

// 输入事件：当用户开始输入时，自动清除placeholder效果
input.addEventListener('input', function() {
    // 输入时不需要特殊处理，因为输入后会覆盖placeholder
});

// 失去焦点事件：如果值为空，显示placeholder
input.addEventListener('blur', function() {
    // 不需要特殊处理，placeholder会自动显示
});
});

// 输入变化时实时计算（使用debounce减少计算频率）
let calculateTimeout;
function scheduleCalculation() {
clearTimeout(calculateTimeout);
calculateTimeout = setTimeout(() => {
    calculatePricing();
}, 50);
}

purchaseCostInput.addEventListener('input', scheduleCalculation);
productWeightInput.addEventListener('input', scheduleCalculation);
listingPriceInput.addEventListener('input', scheduleCalculation);

// 初始计算
updateProductTypeReminder();
calculatePricing();

// 计算定价函数
function calculatePricing() {
// 获取输入值，如果为空则视为0
const purchaseCost = parseFloat(purchaseCostInput.value) || 0;
const productWeight = parseFloat(productWeightInput.value) || 0;
const listingPrice = parseFloat(listingPriceInput.value) || 0;
const exchangeRate = parseFloat(exchangeRateInput.value) || 9;

// 获取当前站点的运费规则
const siteRules = siteConfig[currentSite].shippingRules;
const productType = siteRules[currentProductType];

// 计算国际运费
let shippingCost = 0;
let selectedRule = null;
let calculationDetails = '';

for (const rule of productType.rules) {
    let matches = false;
    
    if (rule.maxWeight !== undefined && rule.minWeight !== undefined) {
        // 有最小值和最大值范围
        if (productWeight > rule.minWeight && productWeight <= rule.maxWeight) {
            matches = true;
        }
    } else if (rule.maxWeight !== undefined && productWeight <= rule.maxWeight) {
        // 只有最大值限制
        matches = true;
    } else if (rule.minWeight !== undefined && productWeight >= rule.minWeight) {
        // 只有最小值限制
        matches = true;
    }
    
    if (matches) {
        shippingCost = rule.formula(productWeight);
        selectedRule = rule;
        calculationDetails = `${rule.formulaText.replace('重量', productWeight.toFixed(2))} = ${shippingCost.toFixed(2)}`;
        break;
    }
}

// 如果没有匹配的规则，使用最后一个规则
if (shippingCost === 0 && productType.rules.length > 0) {
    const lastRule = productType.rules[productType.rules.length - 1];
    shippingCost = lastRule.formula(productWeight);
    selectedRule = lastRule;
    calculationDetails = `${lastRule.formulaText.replace('重量', productWeight.toFixed(2))} = ${shippingCost.toFixed(2)}`;
}

// 计算其他值
const listingPriceRMB = listingPrice * exchangeRate;
const ebayFee = listingPriceRMB * 0.22;
const totalCost = purchaseCost + shippingCost;
const profit = listingPriceRMB - ebayFee - totalCost;
const profitRate = listingPriceRMB - ebayFee > 0 ? (profit / (listingPriceRMB - ebayFee)) * 100 : 0;

// 更新结果显示
purchaseCostResult.innerHTML = purchaseCost.toFixed(2);
productWeightResult.innerHTML = productWeight.toFixed(2) + ' <span style="font-size: 18px; color: #666; margin-left: 4px;">kg</span>';
listingPriceResult.innerHTML = listingPrice.toFixed(2) + '<span class="' + (currentSite === 'uk' ? 'listing-price-symbol' : 'listing-price-euro') + '">' + siteConfig[currentSite].currencySymbol + '</span>';
shippingCostResult.innerHTML = shippingCost.toFixed(2);
ebayFeeResult.innerHTML = ebayFee.toFixed(2);
totalCostResult.innerHTML = totalCost.toFixed(2);

// 利润显示
profitValue.innerHTML = profit.toFixed(2);
profitMarginValue.textContent = profitRate.toFixed(2) + '%';

// 检查利润率是否低于30% - 现在放在利润率下面
if (profitRate < 30 && profitRate >= 0) {
    profitWarning.style.display = 'flex';
    profitMarginValue.style.color = '#dc3545';
} else if (profitRate < 0) {
    profitWarning.style.display = 'none';
    profitMarginValue.style.color = '#dc3545';
} else {
    profitWarning.style.display = 'none';
    profitMarginValue.style.color = '#28a745';
}

// 利润颜色设置
if (profit >= 0) {
    profitValue.style.color = '#28a745';
} else {
    profitValue.style.color = '#dc3545';
}

// 更新国际运费计算详情
updateShippingDetail(productType, productWeight, shippingCost, selectedRule, calculationDetails);
}

// 更新国际运费计算详情
function updateShippingDetail(productType, productWeight, shippingCost, selectedRule, calculationDetails) {
if (!selectedRule) return;

let html = `
    <div class="shipping-rule">
        <div class="shipping-label">产品类型：</div>
        <div class="shipping-value">${productType.name}</div>
    </div>
    <div class="shipping-rule">
        <div class="shipping-label">产品重量：</div>
        <div class="shipping-value">${productWeight.toFixed(2)} kg</div>
    </div>
    <div class="shipping-rule">
        <div class="shipping-label">适用规则：</div>
        <div class="shipping-value">${selectedRule.description}</div>
    </div>
    <div class="shipping-rule">
        <div class="shipping-label">运费公式：</div>
        <div class="shipping-value">${selectedRule.formulaText}</div>
    </div>
`;

if (calculationDetails) {
    html += `
        <div class="shipping-formula">
            计算过程：${calculationDetails}
        </div>
    `;
}

html += `
    <div class="shipping-rule">
        <div class="shipping-label">国际运费：</div>
        <div class="shipping-value" style="font-weight: 700; color: #0057b8;">${shippingCost.toFixed(2)} 人民币</div>
    </div>
`;

shippingDetailContent.innerHTML = html;
}

// 初始化：设置英国站点为默认
switchSite('uk');
</script>
